<head>

    <style>
        /* ========== Core styles ========== */
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-orange: #f97316;
            --accent-green: #10b981;
            --accent-yellow: #eab308;
            --gradient-1: linear-gradient(135deg, #06b6d4, #3b82f6);
            --gradient-2: linear-gradient(135deg, #8b5cf6, #ec4899);
            --gradient-3: linear-gradient(135deg, #f97316, #eab308);
            --gradient-4: linear-gradient(135deg, #10b981, #06b6d4);
            --gradient-hero: linear-gradient(135deg, #f0f9ff 0%, #fdf2f8 30%, #fff7ed 60%, #f0fdf4 100%);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-glow: 0 0 40px rgba(6, 182, 212, 0.25), 0 0 80px rgba(139, 92, 246, 0.15);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            background-image: url('https://images.unsplash.com/photo-1617814076367-b759c7d7e738?w=1920&q=60');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.92);
            z-index: -1;
        }

        .bg-decoration {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
            animation: floatAround 20s ease-in-out infinite;
        }
        .bg-decoration:nth-child(1) { width: 400px; height: 400px; background: #06b6d4; top: -100px; left: -100px; }
        .bg-decoration:nth-child(2) { width: 350px; height: 350px; background: #ec4899; top: 50%; right: -120px; animation-delay: -7s; }
        .bg-decoration:nth-child(3) { width: 300px; height: 300px; background: #f97316; bottom: -80px; left: 30%; animation-delay: -14s; }
        .bg-decoration:nth-child(4) { width: 280px; height: 280px; background: #8b5cf6; top: 30%; left: 50%; animation-delay: -3s; }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 25px) scale(0.9); }
            75% { transform: translate(-35px, -20px) scale(1.05); }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        .app-header {
            display: flex; align-items: center; justify-content: space-between; padding: 16px 28px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md); margin-bottom: 24px; border: 1px solid rgba(255, 255, 255, 0.6);
            flex-wrap: wrap; gap: 14px;
        }
        .app-header .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.5rem; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .app-header .logo .icon { font-size: 2.2rem; -webkit-text-fill-color: initial; }
        .stage-indicator { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .stage-dot {
            width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem; border: 2px solid #e2e8f0; background: #fff; color: #94a3b8;
        }
        .stage-dot.active { background: var(--gradient-1); color: #fff; border-color: transparent; box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); animation: pulseDot 2s ease-in-out infinite; }
        .stage-dot.done { background: #d1fae5; border-color: #10b981; color: #059669; }
        @keyframes pulseDot { 0%, 100% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); } 50% { box-shadow: 0 0 35px rgba(6, 182, 212, 0.7); } }
        .stage-connector { width: 24px; height: 2px; background: #e2e8f0; }
        .stage-connector.done { background: #10b981; }

        .card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border-radius: var(--radius-xl);
            padding: 32px; box-shadow: var(--shadow-md); border: 1px solid rgba(255, 255, 255, 0.7);
            margin-bottom: 24px;
        }
        .card.glow-cyan { border-left: 4px solid #06b6d4; }
        .card.glow-purple { border-left: 4px solid #8b5cf6; }
        .card.glow-orange { border-left: 4px solid #f97316; }
        .card.glow-green { border-left: 4px solid #10b981; }

        .btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 50px;
            font-weight: 700; font-size: 1rem; cursor: pointer; border: none; transition: var(--transition);
            white-space: nowrap;
        }
        .btn-primary { background: var(--gradient-1); color: #fff; box-shadow: 0 6px 24px rgba(6, 182, 212, 0.35); }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-accent { background: var(--gradient-2); color: #fff; }
        .btn-outline { background: #fff; border: 2px solid #e2e8f0; color: var(--text); }
        .btn-success { background: var(--gradient-4); color: #fff; }
        .btn-warning { background: var(--gradient-3); color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sm { padding: 8px 18px; font-size: 0.85rem; border-radius: 30px; }

        .login-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 24px; }
        .login-card {
            background: #fff; border-radius: var(--radius-lg); padding: 28px; text-align: center; cursor: pointer;
            border: 3px solid #e2e8f0; transition: var(--transition); box-shadow: var(--shadow-sm);
        }
        .login-card:hover { border-color: #06b6d4; transform: translateY(-4px); }
        .login-card.selected { border-color: #06b6d4; box-shadow: var(--shadow-glow); background: #f0fdff; }
        .login-card .team-avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px; object-fit: cover; border: 3px solid #e2e8f0; }

        .email-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; max-height: 400px; overflow-y: auto; }
        .email-card { background: #fff; border-radius: var(--radius-md); padding: 16px; border: 1px solid #e2e8f0; box-shadow: var(--shadow-sm); font-size: 0.9rem; }
        .email-card .keyword-tag { display: inline-block; background: #dbeafe; color: #2563eb; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; margin-top: 6px; }

        .quiz-question { background: #fff; border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .quiz-option { padding: 10px 18px; border-radius: 30px; cursor: pointer; border: 2px solid #e2e8f0; background: #fff; font-weight: 600; margin-right: 8px; }
        .quiz-option:hover { border-color: #06b6d4; }
        .quiz-option.selected { background: #06b6d4; color: #fff; border-color: #06b6d4; }
        .quiz-option.correct { background: #10b981; color: #fff; border-color: #10b981; }
        .quiz-option.incorrect { background: #ef4444; color: #fff; border-color: #ef4444; }

        .timer-display { font-size: 4rem; font-weight: 900; text-align: center; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .timer-display.warning { background: var(--gradient-3); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .iframe-container { width: 100%; height: 600px; border-radius: var(--radius-lg); overflow: hidden; border: 2px solid #e2e8f0; }
        .upload-zone { border: 3px dashed #cbd5e1; border-radius: var(--radius-lg); padding: 48px; text-align: center; cursor: pointer; }
        .upload-zone:hover { border-color: #06b6d4; background: #f0fdff; }
        .vote-row { display: flex; align-items: center; gap: 16px; padding: 16px; background: #fff; border-radius: var(--radius-md); margin-bottom: 12px; }
        .vote-slider { flex: 1; accent-color: #06b6d4; }
        .winner-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--gradient-3); color: #fff; padding: 10px 22px; border-radius: 50px; font-weight: 800; animation: bounceIn 0.6s; }
        @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        .toast { position: fixed; top: 24px; right: 24px; background: #fff; border-radius: var(--radius-md); padding: 16px 24px; box-shadow: var(--shadow-lg); z-index: 200; font-weight: 600; border-left: 4px solid #10b981; }
        .connection-status { position: fixed; bottom: 20px; left: 20px; padding: 10px 20px; border-radius: 30px; font-weight: 700; z-index: 300; }
        .connected { background: #10b981; color: #fff; }
        .disconnected { background: #ef4444; color: #fff; }

        @media (max-width: 768px) {
            .card { padding: 20px; }
            .timer-display { font-size: 2.5rem; }
            .iframe-container { height: 400px; }
            .app-header { padding: 12px 16px; gap: 8px; }
            .stage-dot { width: 30px; height: 30px; font-size: 0.7rem; }
            .stage-connector { width: 14px; }
            .btn { padding: 10px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div><div class="bg-decoration"></div><div class="bg-decoration"></div><div class="bg-decoration"></div>

                { subject: 'Multi-modal route optimization', from: 'logistics@evcompany.com', excerpt: 'Combining EV charging stops with delivery routes...', keyword: 'routing', promptIndex: 4 }
            ];

            const prompts = [
                { id: 0, title: 'Automation Excellence', description: 'How can we better complete automation code management and visualization across all engineering teams?', icon: 'AUTO', color: '#06b6d4' },
                { id: 1, title: 'Charging Trust', description: 'How can we improve electric vehicle charging reliability and customer trust without increasing infrastructure costs?', icon: 'EV', color: '#f97316' },
                { id: 2, title: 'Radical Transparency', description: 'How can we build a transparency-first data ecosystem that earns customer trust and differentiates our brand?', icon: 'DATA', color: '#10b981' },
                { id: 3, title: 'Battery Longevity', description: 'How can software solutions optimize battery performance and extend lifespan while reducing range anxiety?', icon: 'BATT', color: '#8b5cf6' },
                { id: 4, title: 'Smart AI Routing', description: 'How can AI-powered routing transform our service operations and customer support experience?', icon: 'AI', color: '#ec4899' }
            ];

            const quizzes = {
                0: [
                    { q: 'What is the biggest challenge in automation code management?', options: ['Scattered repositories', 'Too many developers', 'Lack of hardware', 'Excessive documentation'], correct: 0 },
                    { q: 'Which benefit does visualization bring to CI/CD?', options: ['Faster compilation', 'Better pipeline observability', 'Reduced code size', 'More programming languages'], correct: 1 },
                    { q: 'What does IaC stand for?', options: ['Internet as Code', 'Infrastructure as Code', 'Integration as Configuration', 'Intelligent automation control'], correct: 1 },
                    { q: 'Which metric best measures automation success?', options: ['Lines of code', 'Deployment frequency and reliability', 'Number of developers', 'Server count'], correct: 1 },
                    { q: 'What is a key goal of automated code review?', options: ['Replace all developers', 'Catch issues early and consistently', 'Write more code', 'Eliminate testing'], correct: 1 }
                ],
                1: [
                    { q: 'What percentage of downtime did our charging network experience?', options: ['5%', '12%', '23%', '35%'], correct: 2 },
                    { q: 'What is the primary driver of customer trust in EV charging?', options: ['Lowest price', 'Reliability and uptime', 'Fastest charging speed', 'Most locations'], correct: 1 },
                    { q: 'How can IoT sensors help charging stations?', options: ['Increase electricity costs', 'Enable predictive maintenance', 'Reduce charging speed', 'Eliminate all downtime'], correct: 1 },
                    { q: 'What uptime do competitors advertise?', options: ['95%', '97.5%', '99.5%', '100%'], correct: 2 },
                    { q: 'Which approach best builds customer trust?', options: ['Hiding performance data', 'Transparent public dashboards', 'Lowering prices only', 'More advertising'], correct: 1 }
                ],
                2: [
                    { q: 'What is the foundation of data transparency?', options: ['Collecting more data', 'Open communication about data use', 'Selling customer data', 'Deleting all data'], correct: 1 },
                    { q: 'How can blockchain help our supply chain?', options: ['Faster deliveries', 'Prove ethical sourcing', 'Reduce battery weight', 'Increase horsepower'], correct: 1 },
                    { q: 'What do customers most want regarding their data?', options: ['Free products', 'Control and visibility', 'Unlimited storage', 'Faster internet'], correct: 1 },
                    { q: 'Which metric correlates with transparency-driven loyalty?', options: ['Page views', 'Customer retention rate', 'Server uptime', 'Code commits'], correct: 1 },
                    { q: 'What is a key element of a customer data portal?', options: ['Complex navigation', 'Clear data visualization and controls', 'Hidden settings', 'Mandatory sharing'], correct: 1 }
                ],
                3: [
                    { q: 'What accelerates battery degradation most?', options: ['Frequent charging', 'High temperatures', 'Using eco mode', 'Night driving'], correct: 1 },
                    { q: 'How much range loss do cold-climate drivers report?', options: ['10%', '20%', '35%', '50%'], correct: 2 },
                    { q: 'What can smart charging algorithms achieve?', options: ['Faster top speed', 'Extended battery life by 20%', 'More horsepower', 'Reduced tire wear'], correct: 1 },
                    { q: 'What is second-life battery use?', options: ['Recycling immediately', 'Repurposing used EV batteries', 'Disposing in landfills', 'Melting down for parts'], correct: 1 },
                    { q: 'Which feature helps reduce range anxiety?', options: ['Louder engine sound', 'Battery health coaching and preheating', 'Faster windshield wipers', 'More cup holders'], correct: 1 }
                ],
                4: [
                    { q: 'What does AI service routing optimize?', options: ['Employee lunch breaks', 'Matching requests to the right technician', 'Office layout', 'Parking spaces'], correct: 1 },
                    { q: 'How much fuel did smart navigation save in pilot?', options: ['5%', '10%', '18%', '30%'], correct: 2 },
                    { q: 'What percentage of inquiries can AI chatbots triage?', options: ['30%', '50%', '70%', '95%'], correct: 2 },
                    { q: 'What enables predictive service scheduling?', options: ['Customer surveys', 'Telemetry data from vehicles', 'Weather forecasts', 'Social media posts'], correct: 1 },
                    { q: 'What is multi-modal route optimization?', options: ['Using only highways', 'Combining charging stops with delivery routes', 'Avoiding all cities', 'Using only back roads'], correct: 1 }
                ]
            };

            const teamDefinitions = [
                { id: 'team_alpha', name: 'Team Alpha', color: '#06b6d4', avatarUrl: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=150&h=150&fit=crop&crop=face' },
                { id: 'team_beta', name: 'Team Beta', color: '#8b5cf6', avatarUrl: 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=150&h=150&fit=crop&crop=face' },
                { id: 'team_gamma', name: 'Team Gamma', color: '#f97316', avatarUrl: 'https://images.unsplash.com/photo-1531482615713-2afd69097998?w=150&h=150&fit=crop&crop=face' },
                { id: 'team_delta', name: 'Team Delta', color: '#10b981', avatarUrl: 'https://images.unsplash.com/photo-1543269865-cbf427effbad?w=150&h=150&fit=crop&crop=face' }
            ];

            // ==================== Socket.IO setup ====================
            const socket = io();
            let currentRoomId = null;
            let currentTeamId = null;
            let gameState = null;
            let timers = {};

            const connStatus = document.getElementById('connectionStatus');
            socket.on('connect', () => {
                connStatus.className = 'connection-status connected';
                connStatus.textContent = 'Live';
            });
            socket.on('disconnect', () => {
                connStatus.className = 'connection-status disconnected';
                connStatus.textContent = 'Disconnected';
            });
            socket.on('state_updated', (newState) => {
                gameState = newState;
                renderApp();
            });
            socket.on('timer_started', ({ stageKey, endTime }) => {
                if (!gameState) return;
                if (!gameState.stageTimers) gameState.stageTimers = {};
                gameState.stageTimers[stageKey] = { endTime, running: true };
                bindTimerDisplay(stageKey, endTime);
                renderApp();
            });

            // ==================== Room actions ====================
            window.createRoom = function() {
                socket.emit('create_room', {}, (res) => {
                    if (res.success) {
                        currentRoomId = res.roomId;
                        gameState = res.gameState;
                        if (navigator.clipboard) {
                            navigator.clipboard.writeText(currentRoomId).then(() => showToast('Room code copied: ' + currentRoomId)).catch(() => showToast('Room created: ' + currentRoomId));
                        } else {
                            showToast('Room created: ' + currentRoomId + ' (please copy manually)');
                        }
                        renderApp();
                    } else { showToast('Error: ' + res.error); }
                });
            };
            window.joinRoom = function(code) {
                socket.emit('join_room', code.toUpperCase(), (res) => {
                    if (res.success) {
                        currentRoomId = res.roomId;
                        gameState = res.gameState;
                        renderApp();
                        showToast('Joined room: ' + currentRoomId);
                    } else { showToast('Error: ' + res.error); }
                });
            };

            function loginTeam(teamId) {
                const def = teamDefinitions.find(t => t.id === teamId);
                socket.emit('team_login', { roomId: currentRoomId, teamId, teamData: { name: def.name, color: def.color, avatarUrl: def.avatarUrl } });
                currentTeamId = teamId;
            }

            function advanceStage(newStage) {
                socket.emit('update_state', { roomId: currentRoomId, newState: { currentStage: newStage } });
            }

            function advanceTeamStage(newStage) {
                socket.emit('advance_team_stage', { roomId: currentRoomId, teamId: currentTeamId, newStage });
            }

            function submitQuizAnswers(answers) {
                const quiz = quizzes[gameState.selectedPromptIndex];
                let score = 0;
                const details = quiz.map((q, i) => {
                    const selectedIndex = answers[i];
                    const isCorrect = selectedIndex === q.correct;
                    if (isCorrect) score++;
                    return {
                        questionIndex: i,
                        question: q.q,
                        selectedIndex,
                        selectedAnswer: q.options[selectedIndex],
                        correctIndex: q.correct,
                        correctAnswer: q.options[q.correct],
                        isCorrect
                    };
                });
                socket.emit('submit_quiz', {
                    roomId: currentRoomId,
                    teamId: currentTeamId,
                    selectedPromptIndex: gameState.selectedPromptIndex,
                    answers,
                    details,
                    score
                });
            }

            function handlePDFUpload(file) {
                if (!file.name.toLowerCase().endsWith('.pdf')) { showToast('Only PDF files are supported.'); return; }
                socket.emit('pdf_uploaded', { roomId: currentRoomId, teamId: currentTeamId, fileInfo: { name: file.name, size: file.size, uploadedAt: Date.now() } });
            }

            function submitVotes(allocations) {
                const total = Object.values(allocations).reduce((a, b) => a + b, 0);
                if (Math.abs(total - TOTAL_VOTE_TOKENS) > 1) { showToast('Total allocation must equal 1000 tokens.'); return; }
                socket.emit('submit_votes', { roomId: currentRoomId, teamId: currentTeamId, allocations });
            }

            function startStageTimer(stageKey, durationSeconds) {
                const endTime = Date.now() + durationSeconds * 1000;
                bindTimerDisplay(stageKey, endTime);
                socket.emit('start_timer', { roomId: currentRoomId, stageKey, endTime });
            }

            function bindTimerDisplay(stageKey, endTime) {
                clearInterval(timers[stageKey]);
                timers[stageKey] = setInterval(() => {
                    const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
                    const idMap = { brainstorm: 'brainstormTimer', pitch_prep: 'pitchPrepTimer', pitch: 'pitchTimer' };
                    const el = document.getElementById(idMap[stageKey]);
                    if (el) el.textContent = formatTime(remaining);
                    if (remaining <= 0) clearInterval(timers[stageKey]);
                }, 200);
            }

            // ==================== Helper functions ====================
            function formatTime(s) { const m = Math.floor(s / 60), sec = s % 60; return m + ':' + sec.toString().padStart(2, '0'); }
            function showToast(msg, duration = 3000) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast'; toast.textContent = msg;
                container.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, duration);
            }
            function spawnConfetti() {
                const container = document.getElementById('confettiContainer');
                const colors = ['#06b6d4', '#8b5cf6', '#ec4899', '#f97316', '#10b981', '#eab308', '#3b82f6', '#f72585'];
                for (let i = 0; i < 80; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.top = -(Math.random() * 40) + 'px';
                    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
                    piece.style.animationDelay = Math.random() * 1.5 + 's';
                    piece.style.width = (8 + Math.random() * 16) + 'px';
                    piece.style.height = (8 + Math.random() * 16) + 'px';
                    container.appendChild(piece);
                    setTimeout(() => piece.remove(), 4000);
                }
            }
            function getCurrentTeam() { return gameState?.teams?.[currentTeamId] || null; }
            function getAllTeams() { return Object.values(gameState?.teams || {}); }
            function getOtherTeams() { return getAllTeams().filter(t => t.id !== currentTeamId); }
            function allVotesSubmitted() { const teams = getAllTeams(); return teams.length > 1 && teams.every(t => gameState.votes[t.id]); }
            function getWinningTeam() { return getAllTeams().reduce((best, t) => (t.tokens || 0) > (best.tokens || 0) ? t : best, null); }
            function getQuizForCurrentPrompt() { return quizzes[gameState?.selectedPromptIndex] || []; }
            function getTimerRemaining(stageKey) {
                const t = gameState?.stageTimers?.[stageKey];
                if (!t || !t.endTime) return null;
                return Math.max(0, Math.ceil((t.endTime - Date.now()) / 1000));
            }
            function getTeamStage() {
                const team = getCurrentTeam();
                if (!team) return null;
                return gameState?.teamStages?.[currentTeamId] || '';
            }

            // ==================== Render engine ====================
            function renderApp() {
                if (!gameState) {
                    document.getElementById('appContainer').innerHTML = `
                        <div class="card glow-cyan" style="text-align:center; margin-top:60px;">
                            <h2>Join or Create a Game Room</h2>
                            <div style="margin:20px;">
                                <button class="btn btn-primary" onclick="createRoom()">Create New Room</button>
                                <div style="margin:20px;">or</div>
                                <input id="joinRoomInput" placeholder="Enter room code" style="padding:12px;border-radius:12px;border:2px solid #e2e8f0;width:200px;text-transform:uppercase;">
                                <button class="btn btn-accent" onclick="joinRoom(document.getElementById('joinRoomInput').value)">Join Room</button>
                            </div>
                        </div>`;
                    return;
                }

                const globalStage = gameState.currentStage;
                const teamStage = getTeamStage();
                const team = getCurrentTeam();
                const allTeams = getAllTeams();
                let stageToRender = globalStage;

                if (globalStage === 'quiz' && teamStage && teamStage !== '') {
                    stageToRender = teamStage;
                }

                let html = '';
                html += renderHeader(globalStage, team);

                switch (stageToRender) {
                    case 'login': html += renderLoginScreen(allTeams); break;
                    case 'prompt': html += renderPromptScreen(); break;
                    case 'quiz': html += renderQuizScreen(); break;
                    case 'mural': html += renderMuralScreen(); break;
                    case 'upload': html += renderUploadScreen(); break;
                    case 'pitch_prep_done':
                        html += `<div class="card glow-purple" style="text-align:center;"><h2>Waiting for other teams to finish preparation...</h2></div>`; break;
                    case 'pitch_prep': html += renderPitchPrepScreen(); break;
                    case 'pitch': html += renderPitchScreen(); break;
                    case 'voting': html += renderVotingScreen(); break;
                    case 'results': html += renderResultsScreen(); break;
                    default: html += renderLoginScreen(allTeams);
                }

                if (globalStage !== 'login' && allTeams.length > 0) {
                    html += renderTeamStatusBar(allTeams);
                }

                document.getElementById('appContainer').innerHTML = html;
                bindEventListeners(stageToRender, globalStage);
            }

            function renderHeader(stage, team) {
                const stages = ['login', 'prompt', 'quiz', 'mural', 'upload', 'pitch_prep', 'pitch', 'voting', 'results'];
                const currentIdx = stages.indexOf(stage);
                const displayStages = ['prompt', 'quiz', 'mural', 'upload', 'pitch_prep', 'pitch', 'voting', 'results'];
                let dots = '';
                displayStages.forEach((s, i) => {
                    const idx = stages.indexOf(s);
                    let cls = 'stage-dot';
                    if (idx < currentIdx) cls += ' done';
                    if (idx === currentIdx) cls += ' active';
                    const icons = { prompt: 'P', quiz: 'Q', mural: 'M', upload: 'U', pitch_prep: 'T', pitch: 'P', voting: 'V', results: 'R' };
                    dots += `<span class="${cls}" title="${s}">${icons[s] || '-'}</span>`;
                    if (i < displayStages.length - 1) {
                        let conn = 'stage-connector';
                        if (idx < currentIdx) conn += ' done';
                        dots += `<span class="${conn}"></span>`;
                    }
                });
                return `
                <div class="app-header">
                    <div class="logo"><span class="icon">BA</span> Brainstorm Arena</div>
                    <div class="stage-indicator">${dots}</div>
                    <div style="display:flex;align-items:center;gap:12px;">
                        ${team ? `<span style="font-weight:700;color:${team.color};background:${team.color}15;padding:6px 16px;border-radius:20px;">${team.name}</span>` : ''}

                        ${currentRoomId ? `<span style="background:#f0fdf4;padding:4px 10px;border-radius:12px;">Room ${currentRoomId}</span>` : ''}

            }

                }

                return `
                <div class="card glow-cyan" style="text-align:center;">
                    <img src="https://images.unsplash.com/photo-1559136555-9303baea8ebd?w=800&q=70" alt="Innovation" style="width:100%;max-width:500px;border-radius:20px;margin-bottom:20px;object-fit:cover;max-height:250px;" loading="lazy" onerror="this.style.display='none'">
                    ${roomInfoHtml}
                    <h1 style="font-size:2.5rem;font-weight:900;background:var(--gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Welcome to Brainstorm Arena</h1>
                    <p style="font-size:1.2rem;color:#64748b;max-width:700px;margin:16px auto;">Select your team to join the innovation competition. Multiple teams collaborate, pitch solutions, and rate each other through a structured AI-driven game.</p>
                    <div class="login-grid">${cards}</div>
                    ${actionHtml}
                    ${teamsForLogin.length > 0 ? `<p style="margin-top:12px;color:#64748b;">${teamsForLogin.length} team(s) already joined</p>` : ''}
                </div>`;
            }

            function renderPromptScreen() {
                const prompt = prompts[gameState.selectedPromptIndex];
                const relevantEmails = emailData.filter(e => e.promptIndex === gameState.selectedPromptIndex);
                const emailCards = emailData.map(e => {

                    return `

                    </div>`;

                return `

                    <div style="text-align:center;margin-top:16px;">

                    </div>

            function renderPitchPrepScreen() {

                    ${timerEnded ? '<p style="color:#f97316;font-weight:800;font-size:1.2rem;">Prep time is over. Get ready to pitch.</p>' : ''}

            function renderVotingScreen() {
                const otherTeams = getOtherTeams();
                const team = getCurrentTeam();
                const hasVoted = team && gameState.votes[currentTeamId];
                const remainingTokens = TOTAL_VOTE_TOKENS - (hasVoted ? Object.values(gameState.votes[currentTeamId])
                    .reduce((s, v) => s + (typeof v === 'number' ? v : 0), 0) : 0);

                const voteRows = otherTeams.map(ot => {
                    const currentVal = hasVoted && gameState.votes[currentTeamId][ot.id] ? gameState.votes[

            function renderResultsScreen() {
                const winner = getWinningTeam();
                const allTeams = getAllTeams().sort((a, b) => (b.tokens || 0) - (a.tokens || 0));
                const podiumLabels = ['1st', '2nd', '3rd', '4th'];
                const teamCards = allTeams.map((t, i) => `
                    <div class="card ${i===0?'glow-orange':''}" style="text-align:center;${i===0?'border:3px solid #eab308;box-shadow:0 0 30px rgba(234,179,8,0.3);':''}">
                        ${i===0 ? '<div class="winner-badge">WINNER</div>' : ''}
                        <h3 style="font-size:1.5rem;font-weight:800;">${podiumLabels[i]||''} ${t.name}</h3>
                        <div style="font-size:2.5rem;font-weight:900;color:${t.color};">${t.tokens||0}</div>
                        <p style="color:#64748b;">Tokens Earned</p>
                        <p style="color:#64748b;">Total All-Time: ${t.totalTokensEarned||0} tokens</p>
                    </div>
                `).join('');

                return `
                <div class="card glow-orange" style="text-align:center;">
                    <img src="https://images.unsplash.com/photo-1533236897111-3e94666b2edf?w=800&q=70" alt="Winner" style="width:100%;max-width:500px;border-radius:20px;margin-bottom:20px;object-fit:cover;max-height:220px;" loading="lazy" onerror="this.style.display='none'">
                    <h2 style="font-size:2.5rem;font-weight:900;">Results - Round ${gameState.roundNumber}</h2>
                    <p style="color:#64748b;font-size:1.1rem;">The team with the most tokens wins! Tokens are recorded and accumulate across rounds.</p>
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:20px;">${teamCards}</div>
                    ${winner ? `<div style="margin-top:20px;font-size:1.3rem;font-weight:700;color:#eab308;">${winner.name} is leading this round.</div>` : ''}
                    <button class="btn btn-primary" style="margin-top:20px;" id="btnNewRound">Start New Round</button>
                </div>`;
            }
            function renderTeamStatusBar(allTeams) {
                const cards = allTeams.map(t => `
                    <div style="background:#fff;border-radius:16px;padding:14px;text-align:center;border:2px solid ${t.color}30;box-shadow:var(--shadow-sm);">
                        <strong style="color:${t.color};">${t.name}</strong>
                        <div style="font-weight:800;">${t.tokens||0} tokens</div>
                        <div style="font-size:0.75rem;color:#64748b;">Quiz: ${t.quizCompleted ? 'Done' : 'Wait'} | PDF: ${t.uploadedPDF ? 'Done' : 'Wait'} | Voted: ${gameState.votes[t.id] ? 'Done' : 'Wait'}</div>
                    </div>
                `).join('');
                return `
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:16px;">
                    ${cards}
                </div>`;
            }

            // ==================== Event bindings ====================
            function bindEventListeners(stage, globalStage) {
                // Login stage events
                if (stage === 'login') {
                    document.querySelectorAll('.login-card').forEach(card => {
                        card.addEventListener('click', function() {
                            const teamId = this.getAttribute('data-team-id');
                            document.querySelectorAll('.login-card').forEach(c => c.classList.remove('selected'));
                            this.classList.add('selected');
                            currentTeamId = teamId;
                            renderApp();
                        });
                    });
                    const btnStartGame = document.getElementById('btnStartGame');
                    if (btnStartGame) btnStartGame.addEventListener('click', () => advanceStage('prompt'));
                    const btnCopy = document.getElementById('btnCopyRoom');
                    if (btnCopy) btnCopy.addEventListener('click', () => {
                        if (currentRoomId && navigator.clipboard) navigator.clipboard.writeText(currentRoomId).then(() => showToast('Room code copied.'));
                    });
                    const btnJoin = document.getElementById('btnJoinGame');
                    if (btnJoin) btnJoin.addEventListener('click', () => { if (currentTeamId) loginTeam(currentTeamId); });
                }

                // Stage-specific button events use advanceTeamStage for team progress.
                if (stage === 'prompt') {
                    const btnQuiz = document.getElementById('btnStartQuiz');
                    if (btnQuiz) btnQuiz.addEventListener('click', () => advanceStage('quiz'));
                }
                if (stage === 'quiz') {
                    document.querySelectorAll('.quiz-option').forEach(option => {
                        option.addEventListener('click', function() {
                            const questionIndex = this.getAttribute('data-q');
                            document.querySelectorAll(`.quiz-option[data-q="${questionIndex}"]`).forEach(opt => opt.classList.remove('selected'));
                            this.classList.add('selected');
                        });
                    });

                    const btnSubmitQuiz = document.getElementById('btnSubmitQuiz');
                    if (btnSubmitQuiz) btnSubmitQuiz.addEventListener('click', () => {
                        const quiz = getQuizForCurrentPrompt();
                        const answers = [];
                        for (let i = 0; i < quiz.length; i++) {
                            const selected = document.querySelector(`.quiz-option.selected[data-q="${i}"]`);
                            if (!selected) {
                                showToast(`Please answer question ${i + 1} before submitting.`);
                                return;
                            }
                            answers[i] = Number(selected.getAttribute('data-o'));
                        }

                        quiz.forEach((q, i) => {
                            document.querySelectorAll(`.quiz-option[data-q="${i}"]`).forEach(opt => {
                                const optionIndex = Number(opt.getAttribute('data-o'));
                                opt.classList.toggle('correct', optionIndex === q.correct);
                                opt.classList.toggle('incorrect', optionIndex === answers[i] && optionIndex !== q.correct);
                            });
                        });

                        submitQuizAnswers(answers);
                    });

                    const btnGoToMural = document.getElementById('btnGoToMural');
                    if (btnGoToMural) btnGoToMural.addEventListener('click', () => advanceTeamStage('mural'));
                }
                if (stage === 'mural') {
                    const btnFinish = document.getElementById('btnFinishBrainstorm');
                    if (btnFinish) btnFinish.addEventListener('click', () => advanceTeamStage('upload'));
                    // Timer startup logic is preserved.
                }
                if (stage === 'upload') {
                    const btnReady = document.getElementById('btnReadyForPitch');
                    if (btnReady) btnReady.addEventListener('click', () => advanceTeamStage('pitch_prep_done'));
                    // Upload logic is preserved.
                }
                if (stage === 'pitch_prep') {
                    // Preparation stage skip button.
                    const btnSkip = document.getElementById('btnSkipPrep');
                    if (btnSkip) btnSkip.addEventListener('click', () => {
                        socket.emit('skip_pitch_prep', { roomId: currentRoomId, teamId: currentTeamId });
                    });
                }
                if (stage === 'pitch') {
                    // Pitch stage skip button.
                    const btnSkip = document.getElementById('btnSkipPitch');
                    if (btnSkip) btnSkip.addEventListener('click', () => {
                        socket.emit('skip_pitch', { roomId: currentRoomId, teamId: currentTeamId });
                    });
                }
                // Voting and results bindings are handled elsewhere.
            }

            window.createRoom = createRoom;
            window.joinRoom = joinRoom;
            renderApp();
        })();
    </script>
</body>
</html>
