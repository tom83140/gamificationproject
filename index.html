<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Brainstorm Arena - Multi-Room Innovation Competition</title>
    <link rel="icon" type="image/png" href="/favicon.PNG">
    <script src="/emailupdater.js"></script>
    <script src="/quizupdater.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* ========== Core styles ========== */
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-orange: #f97316;
            --accent-green: #10b981;
            --accent-yellow: #eab308;
            --gradient-1: linear-gradient(135deg, #06b6d4, #3b82f6);
            --gradient-2: linear-gradient(135deg, #8b5cf6, #ec4899);
            --gradient-3: linear-gradient(135deg, #f97316, #eab308);
            --gradient-4: linear-gradient(135deg, #10b981, #06b6d4);
            --gradient-hero: linear-gradient(135deg, #f0f9ff 0%, #fdf2f8 30%, #fff7ed 60%, #f0fdf4 100%);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-glow: 0 0 40px rgba(6, 182, 212, 0.25), 0 0 80px rgba(139, 92, 246, 0.15);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            background-image: url('https://images.unsplash.com/photo-1617814076367-b759c7d7e738?w=1920&q=60');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.92);
            z-index: -1;
        }

        .bg-decoration {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
            animation: floatAround 20s ease-in-out infinite;
        }
        .bg-decoration:nth-child(1) { width: 400px; height: 400px; background: #06b6d4; top: -100px; left: -100px; }
        .bg-decoration:nth-child(2) { width: 350px; height: 350px; background: #ec4899; top: 50%; right: -120px; animation-delay: -7s; }
        .bg-decoration:nth-child(3) { width: 300px; height: 300px; background: #f97316; bottom: -80px; left: 30%; animation-delay: -14s; }
        .bg-decoration:nth-child(4) { width: 280px; height: 280px; background: #8b5cf6; top: 30%; left: 50%; animation-delay: -3s; }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 25px) scale(0.9); }
            75% { transform: translate(-35px, -20px) scale(1.05); }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        .app-header {
            display: flex; align-items: center; justify-content: space-between; padding: 16px 28px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md); margin-bottom: 24px; border: 1px solid rgba(255, 255, 255, 0.6);
            flex-wrap: wrap; gap: 14px;
        }
        .app-header .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.5rem; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .app-header .logo .icon { font-size: 2.2rem; -webkit-text-fill-color: initial; }
        .stage-indicator { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .stage-dot {
            width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem; border: 2px solid #e2e8f0; background: #fff; color: #94a3b8;
        }
        .stage-dot.active { background: var(--gradient-1); color: #fff; border-color: transparent; box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); animation: pulseDot 2s ease-in-out infinite; }
        .stage-dot.done { background: #d1fae5; border-color: #10b981; color: #059669; }
        @keyframes pulseDot { 0%, 100% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); } 50% { box-shadow: 0 0 35px rgba(6, 182, 212, 0.7); } }
        .stage-connector { width: 24px; height: 2px; background: #e2e8f0; }
        .stage-connector.done { background: #10b981; }

        .card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border-radius: var(--radius-xl);
            padding: 32px; box-shadow: var(--shadow-md); border: 1px solid rgba(255, 255, 255, 0.7);
            margin-bottom: 24px;
        }
        .card.glow-cyan { border-left: 4px solid #06b6d4; }
        .card.glow-purple { border-left: 4px solid #8b5cf6; }
        .card.glow-orange { border-left: 4px solid #f97316; }
        .card.glow-green { border-left: 4px solid #10b981; }

        .btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 50px;
            font-weight: 700; font-size: 1rem; cursor: pointer; border: none; transition: var(--transition);
            white-space: nowrap;
        }
        .btn-primary { background: var(--gradient-1); color: #fff; box-shadow: 0 6px 24px rgba(6, 182, 212, 0.35); }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-accent { background: var(--gradient-2); color: #fff; }
        .btn-outline { background: #fff; border: 2px solid #e2e8f0; color: var(--text); }
        .btn-success { background: var(--gradient-4); color: #fff; }
        .btn-warning { background: var(--gradient-3); color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sm { padding: 8px 18px; font-size: 0.85rem; border-radius: 30px; }

        .login-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 24px; }
        .login-card {
            background: #fff; border-radius: var(--radius-lg); padding: 28px; text-align: center; cursor: pointer;
            border: 3px solid #e2e8f0; transition: var(--transition); box-shadow: var(--shadow-sm);
        }
        .login-card:hover { border-color: #06b6d4; transform: translateY(-4px); }
        .login-card.selected { border-color: #06b6d4; box-shadow: var(--shadow-glow); background: #f0fdff; }
        .login-card .team-avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px; object-fit: cover; border: 3px solid #e2e8f0; }

        .email-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; max-height: 460px; overflow-y: auto; }
        .email-card { background: #fff; border-radius: var(--radius-md); padding: 16px; border: 1px solid #e2e8f0; box-shadow: var(--shadow-sm); font-size: 0.9rem; cursor: pointer; text-align: left; transition: var(--transition); }
        .email-card:hover { transform: translateY(-2px); border-color: #06b6d4; }
        .email-card.expanded { grid-column: 1 / -1; }
        .keyword-tag { display: inline-block; background: #dbeafe; color: #2563eb; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; margin-top: 6px; }
        .email-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e2e8f0; color: #334155; }
        .email-card-hint { display: block; margin-top: 8px; color: #94a3b8; font-size: 0.75rem; font-weight: 700; }
        .email-modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.55); z-index: 900; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .email-modal { width: min(760px, 100%); max-height: min(720px, 88vh); overflow-y: auto; background: #fff; border-radius: var(--radius-lg); padding: 26px; box-shadow: var(--shadow-lg); border: 1px solid #e2e8f0; }
        .email-modal-header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 14px; }
        .email-modal-title { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
        .email-modal-from { color: #64748b; font-size: 0.9rem; margin-top: 4px; }
        .email-modal-body { white-space: pre-line; color: #334155; line-height: 1.7; }
        .email-modal-close { border: 0; background: #f1f5f9; color: #334155; border-radius: 999px; width: 36px; height: 36px; cursor: pointer; font-weight: 900; flex: 0 0 auto; }

        .quiz-question { background: #fff; border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .quiz-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; margin-top: 12px; }
        .quiz-option { display: flex; align-items: center; min-height: 48px; padding: 10px 14px; border-radius: 14px; cursor: pointer; border: 2px solid #e2e8f0; background: #fff; font-weight: 600; line-height: 1.35; white-space: normal; overflow-wrap: anywhere; }
        .quiz-option:hover { border-color: #06b6d4; }
        .quiz-option.selected { background: #06b6d4; color: #fff; border-color: #06b6d4; }
        .quiz-option.correct { background: #10b981; color: #fff; border-color: #10b981; }
        .quiz-option.incorrect { background: #ef4444; color: #fff; border-color: #ef4444; }
        .quiz-option.correct-answer { background: #f0fdf4; color: #065f46; border: 2px dashed #10b981; animation: correctAnswerPulse 1s ease-in-out infinite; }
        .quiz-option.correct-answer.selected { background: #10b981; color: #fff; }
        @keyframes correctAnswerPulse { 0%, 100% { box-shadow: 0 0 0 rgba(16,185,129,0); } 50% { box-shadow: 0 0 18px rgba(16,185,129,0.65); } }

        .timer-display { font-size: 4rem; font-weight: 900; text-align: center; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .timer-display.warning { background: var(--gradient-3); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .iframe-container { width: 100%; height: 600px; border-radius: var(--radius-lg); overflow: hidden; border: 2px solid #e2e8f0; }
        .iframe-container iframe { width: 100%; height: 100%; border: 0; display: block; }
        .mural-container { height: auto; min-height: 480px; aspect-ratio: 16 / 9; background: #f4f4f4; }
        .vote-row { display: flex; align-items: center; gap: 16px; padding: 16px; background: #fff; border-radius: var(--radius-md); margin-bottom: 12px; }
        .vote-slider { flex: 1; accent-color: #06b6d4; }
        .rating-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-top: 18px; }
        .rating-card { background: #fff; border-radius: var(--radius-lg); border: 1px solid #e2e8f0; padding: 18px; box-shadow: var(--shadow-sm); }
        .rating-row { display: grid; grid-template-columns: 1fr 88px; gap: 10px; align-items: center; margin-top: 12px; }
        .rating-row select { padding: 8px 10px; border-radius: 10px; border: 2px solid #e2e8f0; font-weight: 800; background: #fff; }
        .rating-total { margin-top: 12px; padding: 10px 12px; border-radius: 12px; background: #f8fafc; font-weight: 800; }
        .rating-frame { width: 100%; min-height: 900px; border: 0; border-radius: var(--radius-lg); background: #0b0c15; display: block; }
        .winner-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--gradient-3); color: #fff; padding: 10px 22px; border-radius: 50px; font-weight: 800; animation: bounceIn 0.6s; }
        @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        .toast { position: fixed; top: 24px; right: 24px; background: #fff; border-radius: var(--radius-md); padding: 16px 24px; box-shadow: var(--shadow-lg); z-index: 200; font-weight: 600; border-left: 4px solid #10b981; }
        .connection-status { position: fixed; bottom: 20px; left: 20px; padding: 10px 20px; border-radius: 30px; font-weight: 700; z-index: 300; }
        .connected { background: #10b981; color: #fff; }
        .disconnected { background: #ef4444; color: #fff; }

        @media (max-width: 768px) {
            .card { padding: 20px; }
            .timer-display { font-size: 2.5rem; }
            .iframe-container { height: 400px; }
            .mural-container { min-height: 360px; }
            .app-header { padding: 12px 16px; gap: 8px; }
            .stage-dot { width: 30px; height: 30px; font-size: 0.7rem; }
            .stage-connector { width: 14px; }
            .btn { padding: 10px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div><div class="bg-decoration"></div><div class="bg-decoration"></div><div class="bg-decoration"></div>
    <div id="toastContainer"></div>
    <div id="confettiContainer" class="confetti"></div>
    <div class="container" id="appContainer"></div>
    <div id="connectionStatus" class="connection-status disconnected">Connecting...</div>

    <script>
        (function() {
            // ==================== CONSTANTS & DATA ====================
            const TOTAL_VOTE_TOKENS = 1000;
            const BRAINSTORM_MINUTES = 60;
            const PITCH_PREP_SECONDS = 30;
            const PITCH_SECONDS = 180;
            const MURAL_URL = 'https://app.mural.co/embed/3705ad41-d863-4bd1-b13b-6830873d2218';
            const RATING_DIMENSIONS = [
                { name: 'Breakthrough Value', desc: 'Is the idea truly novel, or is it an incremental improvement?' },
                { name: 'Problem-Solution Fit', desc: 'Does it solve a genuine, compelling pain point for a specific audience?' },
                { name: 'Clarity', desc: 'Is the message conveyed clearly and concisely without excessive jargon?' },
                { name: 'Economic Logic', desc: 'Are the financial projections, revenue streams, and cost structures realistic?' }
            ];
            const RATING_TIERS = ['S', 'A', 'B', 'C', 'D', 'E', 'F'];

            const emailData = window.emailData || [];
            const prompts = window.prompts || [];
            const quizzes = window.quizzes || {};

            const teamDefinitions = [
                { id: 'team_alpha', name: 'Team Alpha', color: '#06b6d4', avatarUrl: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=150&h=150&fit=crop&crop=face' },
                { id: 'team_beta', name: 'Team Beta', color: '#8b5cf6', avatarUrl: 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=150&h=150&fit=crop&crop=face' },
                { id: 'team_gamma', name: 'Team Gamma', color: '#f97316', avatarUrl: 'https://images.unsplash.com/photo-1531482615713-2afd69097998?w=150&h=150&fit=crop&crop=face' },
                { id: 'team_delta', name: 'Team Delta', color: '#10b981', avatarUrl: 'https://images.unsplash.com/photo-1543269865-cbf427effbad?w=150&h=150&fit=crop&crop=face' }
            ];

            // ==================== Socket.IO setup ====================
            const socket = io();
            let currentRoomId = null;
            let currentTeamId = null;
            let gameState = null;
            let timers = {};
            let expandedEmailIndex = null;
            let quizAdvanceTimer = null;

            const connStatus = document.getElementById('connectionStatus');
            socket.on('connect', () => {
                connStatus.className = 'connection-status connected';
                connStatus.textContent = 'Live';
            });
            socket.on('disconnect', () => {
                connStatus.className = 'connection-status disconnected';
                connStatus.textContent = 'Disconnected';
            });
            socket.on('state_updated', (newState) => {
                gameState = newState;
                renderApp();
            });
            socket.on('timer_started', ({ stageKey, endTime }) => {
                if (!gameState) return;
                if (!gameState.stageTimers) gameState.stageTimers = {};
                gameState.stageTimers[stageKey] = { endTime, running: true, ended: false };
                bindTimerDisplay(stageKey, endTime);
                renderApp();
            });
            socket.on('rating_submission_updated', ({ teamId, submission }) => {
                if (!gameState) return;
                if (!gameState.ratingSubmissions) gameState.ratingSubmissions = {};
                gameState.ratingSubmissions[teamId] = submission;

                const status = document.getElementById('ratingSubmissionStatus');
                if (status) {
                    const submittedTeams = Object.keys(gameState.ratingSubmissions)
                        .map(id => gameState.teams[id]?.name)
                        .filter(Boolean)
                        .map(name => `<span style="background:#f0fdf4;padding:4px 10px;border-radius:12px;font-size:0.8rem;">${name} rated</span>`)
                        .join(' ');
                    status.innerHTML = submittedTeams;
                }
            });

            window.addEventListener('message', (event) => {
                if (event.origin !== window.location.origin) return;
                if (event.data?.type !== 'rating_submit') return;
                if (!currentRoomId || !currentTeamId) return;

                const payload = {
                    ...event.data.payload,
                    scorerTeamId: currentTeamId,
                    scorerTeamName: getCurrentTeam()?.name || currentTeamId,
                    totalsByTarget: mapRatingReceivedToTeamIds(event.data.payload?.scorerReceived || {})
                };

                socket.emit('submit_rating', { roomId: currentRoomId, teamId: currentTeamId, payload }, (res) => {
                    if (!res?.success) {
                        showToast(res?.error || 'Rating submission failed.');
                        return;
                    }
                    if (!gameState.ratingSubmissions) gameState.ratingSubmissions = {};
                    gameState.ratingSubmissions[currentTeamId] = payload;
                    showToast('Rating JSON submitted to Google Sheet.');
                    if (res.allRated) {
                        gameState = res.gameState;
                        renderApp();
                    } else {
                        const frame = document.querySelector('.rating-frame');
                        if (frame) frame.style.opacity = '0.55';
                    }
                });
            });

            // ==================== Room actions ====================
            window.createRoom = function() {
                socket.emit('create_room', {}, (res) => {
                    if (res.success) {
                        currentRoomId = res.roomId;
                        gameState = res.gameState;
                        if (navigator.clipboard) {
                            navigator.clipboard.writeText(currentRoomId).then(() => showToast('Room code copied: ' + currentRoomId)).catch(() => showToast('Room created: ' + currentRoomId));
                        } else {
                            showToast('Room created: ' + currentRoomId + ' (please copy manually)');
                        }
                        renderApp();
                    } else { showToast('Error: ' + res.error); }
                });
            };
            window.joinRoom = function(code) {
                socket.emit('join_room', code.toUpperCase(), (res) => {
                    if (res.success) {
                        currentRoomId = res.roomId;
                        gameState = res.gameState;
                        renderApp();
                        showToast('Joined room: ' + currentRoomId);
                    } else { showToast('Error: ' + res.error); }
                });
            };

            // ==================== Game actions ====================
            function loginTeam(teamId) {
                const def = teamDefinitions.find(t => t.id === teamId);
                socket.emit('team_login', { roomId: currentRoomId, teamId, teamData: { name: def.name, color: def.color, avatarUrl: def.avatarUrl } });
                currentTeamId = teamId;
            }

            function advanceStage(newStage) {
                socket.emit('update_state', { roomId: currentRoomId, newState: { currentStage: newStage } });
            }

            function advanceTeamStage(newStage) {
                socket.emit('advance_team_stage', { roomId: currentRoomId, teamId: currentTeamId, newStage });
            }

            function submitQuizAnswers(answers) {
                const quiz = getQuizForCurrentPrompt();
                let score = 0;
                const details = quiz.map((q, i) => {
                    const selectedIndex = answers[i];
                    const isCorrect = selectedIndex === q.correct;
                    if (isCorrect) score++;
                    return {
                        questionIndex: i,
                        question: q.q,
                        selectedIndex,
                        selectedAnswer: q.options[selectedIndex],
                        correctIndex: q.correct,
                        correctAnswer: q.options[q.correct],
                        isCorrect
                    };
                });

                if (gameState?.teams?.[currentTeamId]) {
                    gameState.teams[currentTeamId].quizCompleted = true;
                    gameState.teams[currentTeamId].quizScore = score;
                    gameState.teams[currentTeamId].quizAnswers = answers;
                    gameState.teams[currentTeamId].quizSubmission = {
                        roundNumber: gameState.roundNumber,
                        selectedPromptIndex: gameState.selectedPromptIndex,
                        score,
                        answers,
                        details,
                        submittedAt: Date.now()
                    };
                    renderApp();
                }

                clearTimeout(quizAdvanceTimer);
                quizAdvanceTimer = setTimeout(() => {
                    advanceTeamStage('mural');
                }, 15000);

                socket.emit('submit_quiz', {
                    roomId: currentRoomId,
                    teamId: currentTeamId,
                    selectedPromptIndex: gameState.selectedPromptIndex,
                    answers,
                    details,
                    score
                }, (res) => {
                    if (!res?.success) showToast(res?.error || 'Quiz submission failed.');
                });
            }

            function submitVotes(allocations) {
                const total = Object.values(allocations).reduce((a, b) => a + b, 0);
                if (Math.abs(total - TOTAL_VOTE_TOKENS) > 1) { showToast('Total allocation must equal 1000 tokens.'); return; }
                socket.emit('submit_votes', { roomId: currentRoomId, teamId: currentTeamId, allocations });
            }

            function startStageTimer(stageKey, durationSeconds) {
                const endTime = Date.now() + durationSeconds * 1000;
                if (!gameState.stageTimers) gameState.stageTimers = {};
                gameState.stageTimers[stageKey] = { endTime, running: true, ended: false };
                renderApp();
                socket.emit('start_timer', { roomId: currentRoomId, stageKey, endTime });
                bindTimerDisplay(stageKey, endTime);
            }

            function bindTimerDisplay(stageKey, endTime) {
                clearInterval(timers[stageKey]);
                timers[stageKey] = setInterval(() => {
                    const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
                    const idMap = { brainstorm: 'brainstormTimer', pitch_prep: 'pitchPrepTimer', pitch: 'pitchTimer' };
                    const el = document.getElementById(idMap[stageKey]);
                    if (el) el.textContent = formatTime(remaining);
                    if (remaining <= 0) {
                        clearInterval(timers[stageKey]);
                        if (gameState?.stageTimers?.[stageKey]) {
                            gameState.stageTimers[stageKey].running = false;
                            gameState.stageTimers[stageKey].ended = true;
                        }
                        renderApp();
                    }
                }, 200);
            }

            // ==================== Helper functions ====================
            function formatTime(s) { const m = Math.floor(s / 60), sec = s % 60; return m + ':' + sec.toString().padStart(2, '0'); }
            function showToast(msg, duration = 3000) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');

            function spawnConfetti() {

            function getRatingTierScores(opponentCount) {
                const base = 250 / Math.max(1, opponentCount);
                return {
                    S: Math.floor(base * 1.0),
                    A: Math.floor(base * 0.8),
                    B: Math.floor(base * 0.65),
                    C: Math.floor(base * 0.5),
                    D: Math.floor(base * 0.35),
                    E: Math.floor(base * 0.2),
                    F: Math.max(1, Math.floor(base * 0.05))
                };
            }
            function ensureCurrentRating() {
                if (!gameState.ratings) gameState.ratings = {};
                if (!gameState.ratings[currentTeamId]) {
                    const rating = {};
                    getOtherTeams().forEach(team => {
                        rating[team.id] = {};
                        RATING_DIMENSIONS.forEach((_, index) => {
                            rating[team.id][index] = 'C';
                        });
                    });
                    gameState.ratings[currentTeamId] = rating;
                }
                return gameState.ratings[currentTeamId];
            }
            function buildRatingPayload() {
                const rating = ensureCurrentRating();
                const otherTeams = getOtherTeams();
                const tierScores = getRatingTierScores(otherTeams.length);
                const totalsByTarget = {};
                const dimensionsByTarget = {};

                otherTeams.forEach(team => {
                    totalsByTarget[team.id] = 0;
                    dimensionsByTarget[team.id] = {};
                    RATING_DIMENSIONS.forEach((dimension, index) => {
                        const tier = rating[team.id]?.[index] || 'C';
                        const points = tierScores[tier] || 0;
                        dimensionsByTarget[team.id][dimension.name] = { tier, points };
                        totalsByTarget[team.id] += points;
                    });
                });

                return {
                    scorerTeamId: currentTeamId,
                    scorerTeamName: getCurrentTeam()?.name || currentTeamId,
                    roundNumber: gameState.roundNumber,
                    dimensions: RATING_DIMENSIONS,
                    tierScores,
                    ratings: rating,
                    totalsByTarget,
                    dimensionsByTarget,
                    submittedAt: new Date().toISOString()
                };
            }
            function getRatingResults() {
                const teams = getAllTeams();
                const totals = {};
                teams.forEach(team => { totals[team.id] = 0; });
                Object.values(gameState?.ratingSubmissions || {}).forEach(submission => {
                    Object.entries(submission.totalsByTarget || {}).forEach(([teamId, points]) => {
                        totals[teamId] = (totals[teamId] || 0) + Number(points || 0);
                    });
                });
                return teams
                    .map(team => ({ ...team, ratingScore: totals[team.id] || 0 }))
                    .sort((a, b) => b.ratingScore - a.ratingScore);
            }
            function getRatingGroupForTeam(team) {
                const id = team?.id || '';
                if (id.includes('alpha')) return 'Alpha';
                if (id.includes('beta')) return 'Beta';
                if (id.includes('gamma')) return 'Gamma';
                if (id.includes('delta')) return 'Delta';
                return team?.name?.replace(/^Team\s+/i, '') || team?.id || '';
            }
            function mapRatingReceivedToTeamIds(received) {
                const totals = {};
                getAllTeams().forEach(team => {

                    totals[team.id] = Number(received?.[group]?.total || 0);
                });
                return totals;
            }
            function buildRatingFrameUrl() {

                return `
                <div class="card glow-pink" style="text-align:center;border-left:4px solid #ec4899;">
                    <img src="https://images.unsplash.com/photo-1559223607-a43c990c692c?w=800&q=70" alt="Pitch" style="width:100%;max-width:500px;border-radius:20px;margin-bottom:20px;object-fit:cover;max-height:220px;" loading="lazy" onerror="this.style.display='none'">
                    <h2 style="font-size:2rem;font-weight:800;">Step 6: Pitch Your Solution</h2>
                    <p style="color:#64748b;font-size:1.2rem;">${pitchingTeam ? `<strong style="color:${pitchingTeam.color};">${pitchingTeam.name}</strong> is pitching now.` : 'The current team is pitching now.'}</p>
                    <p style="color:#64748b;font-size:1.2rem;">Each team has <strong>3 minutes</strong> to present their solution.</p>
                    <div class="timer-display ${remaining!==null&&remaining<30?'warning':''}" id="pitchTimer" style="font-size:5rem;">${remaining!==null?formatTime(remaining):'3:00'}</div>
                    ${!timerRunning && !timerEnded ? '<button class="btn btn-accent" id="btnStartPitchTimer">Start 3-Minute Pitch Timer</button>' : ''}
                    ${!timerEnded ? '<button class="btn btn-outline" id="btnSkipPitch" style="margin-left:10px;">Skip Pitch</button>' : ''}
                    ${timerEnded ? '<p style="color:#ec4899;font-weight:800;font-size:1.2rem;">Time is up.</p>' : ''}
                    ${timerEnded ? '<button class="btn btn-primary" id="btnFinishPitch">Finish Pitch / Next Team</button>' : ''}
                </div>`;
            }
            function renderVotingScreen() {
                const hasSubmitted = Boolean(gameState?.ratingSubmissions?.[currentTeamId]);
                const submittedTeams = Object.keys(gameState?.ratingSubmissions || {})
                    .map(teamId => gameState.teams[teamId]?.name)
                    .filter(Boolean)
                    .map(name => `<span style="background:#f0fdf4;padding:4px 10px;border-radius:12px;font-size:0.8rem;">${name} rated</span>`)
                    .join(' ');

                return `
                <div class="card glow-purple">
                    <h2 style="font-size:2rem;font-weight:800;">Step 7: Team Peer Review</h2>
                    <p style="color:#64748b;">The scorer below is loaded directly from <strong>rating.html</strong>. It has been preconfigured for this room and the current team. Submit from inside the scorer to save the generated JSON to Google Sheets.</p>
                    ${hasSubmitted ? '<p style="color:#10b981;font-weight:700;text-align:center;">You have submitted your rating.</p>' : ''}
                    <iframe class="rating-frame" src="${buildRatingFrameUrl()}" title="Team Peer Review"></iframe>
                    <div id="ratingSubmissionStatus" style="text-align:center;margin-top:8px;color:#64748b;font-size:0.85rem;">${submittedTeams}</div>
                    <div style="text-align:center;margin-top:16px;">
                        ${Object.keys(gameState?.ratingSubmissions || {}).length === getAllTeams().length ? '<button class="btn btn-success" id="btnShowResults">Show Results</button>' : '<p style="color:#f97316;">Waiting for all teams to submit ratings...</p>'}
                    </div>
                </div>`;
            }
            function renderResultsScreen() {
                const allTeams = getRatingResults();
                const winner = allTeams[0] || null;
                const podiumLabels = ['1st', '2nd', '3rd', '4th'];
                const teamCards = allTeams.map((t, i) => `
                    <div class="card ${i===0?'glow-orange':''}" style="text-align:center;${i===0?'border:3px solid #eab308;box-shadow:0 0 30px rgba(234,179,8,0.3);':''}">
                        ${i===0 ? '<div class="winner-badge">WINNER</div>' : ''}
                        <h3 style="font-size:1.5rem;font-weight:800;">${podiumLabels[i]||''} ${t.name}</h3>
                        <div style="font-size:2.5rem;font-weight:900;color:${t.color};">${t.ratingScore||0}</div>
                        <p style="color:#64748b;">Peer Review Tokens</p>
                    </div>
                `).join('');

                return `
                <div class="card glow-orange" style="text-align:center;">
                    <img src="https://images.unsplash.com/photo-1533236897111-3e94666b2edf?w=800&q=70" alt="Winner" style="width:100%;max-width:500px;border-radius:20px;margin-bottom:20px;object-fit:cover;max-height:220px;" loading="lazy" onerror="this.style.display='none'">
                    <h2 style="font-size:2.5rem;font-weight:900;">Results - Round ${gameState.roundNumber}</h2>
                    <p style="color:#64748b;font-size:1.1rem;">The team with the most tokens wins! Tokens are recorded and accumulate across rounds.</p>
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:20px;">${teamCards}</div>
                    ${winner ? `<div style="margin-top:20px;font-size:1.3rem;font-weight:700;color:#eab308;">${winner.name} is leading this round.</div>` : ''}
                    <button class="btn btn-primary" style="margin-top:20px;" id="btnNewRound">Start New Round</button>
                </div>`;
            }
            function renderTeamStatusBar(allTeams) {
                const cards = allTeams.map(t => `
                    <div style="background:#fff;border-radius:16px;padding:14px;text-align:center;border:2px solid ${t.color}30;box-shadow:var(--shadow-sm);">
                        <strong style="color:${t.color};">${t.name}</strong>
                        <div style="font-weight:800;">${t.tokens||0} tokens</div>
                        <div style="font-size:0.75rem;color:#64748b;">Quiz: ${t.quizCompleted ? 'Done' : 'Wait'} | Voted: ${gameState.votes[t.id] ? 'Done' : 'Wait'}</div>
                    </div>
                `).join('');
                return `
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:16px;">
                    ${cards}
                </div>`;
            }

            // ==================== Event bindings ====================
            function bindEventListeners(stage, globalStage) {
                // Login stage events
                if (stage === 'login') {
                    document.querySelectorAll('.login-card').forEach(card => {
                        card.addEventListener('click', function() {
                            const teamId = this.getAttribute('data-team-id');
                            document.querySelectorAll('.login-card').forEach(c => c.classList.remove('selected'));
                            this.classList.add('selected');
                            currentTeamId = teamId;
                            renderApp();
                        });
                    });
                    const btnStartGame = document.getElementById('btnStartGame');
                    if (btnStartGame) btnStartGame.addEventListener('click', () => advanceStage('prompt'));
                    const btnCopy = document.getElementById('btnCopyRoom');
                    if (btnCopy) btnCopy.addEventListener('click', () => {
                        if (currentRoomId && navigator.clipboard) navigator.clipboard.writeText(currentRoomId).then(() => showToast('Room code copied.'));
                    });
                    const btnJoin = document.getElementById('btnJoinGame');
                    if (btnJoin) btnJoin.addEventListener('click', () => { if (currentTeamId) loginTeam(currentTeamId); });
                }

                // Stage-specific button events use advanceTeamStage for team progress.
                if (stage === 'prompt') {
                    document.querySelectorAll('.email-card').forEach(card => {
                        card.addEventListener('click', function() {
                            const index = Number(this.getAttribute('data-email-index'));
                            showEmailModal(index);
                        });
                    });

                    const btnQuiz = document.getElementById('btnStartQuiz');
                    if (btnQuiz) btnQuiz.addEventListener('click', () => advanceStage('quiz'));
                }
                if (stage === 'quiz') {
                    document.querySelectorAll('.quiz-option').forEach(option => {
                        option.addEventListener('click', function() {
                            const questionIndex = this.getAttribute('data-q');
                            document.querySelectorAll(`.quiz-option[data-q="${questionIndex}"]`).forEach(opt => opt.classList.remove('selected'));
                            this.classList.add('selected');
                        });
                    });

                    const btnSubmitQuiz = document.getElementById('btnSubmitQuiz');
                    if (btnSubmitQuiz) btnSubmitQuiz.addEventListener('click', () => {
                        const quiz = getQuizForCurrentPrompt();
                        const answers = [];
                        for (let i = 0; i < quiz.length; i++) {
                            const selected = document.querySelector(`.quiz-option.selected[data-q="${i}"]`);
                            if (!selected) {
                                showToast(`Please answer question ${i + 1} before submitting.`);
                                return;
                            }
                            answers[i] = Number(selected.getAttribute('data-o'));
                        }

                        quiz.forEach((q, i) => {
                            document.querySelectorAll(`.quiz-option[data-q="${i}"]`).forEach(opt => {
                                const optionIndex = Number(opt.getAttribute('data-o'));
                                opt.classList.toggle('correct', optionIndex === q.correct);
                                opt.classList.toggle('incorrect', optionIndex === answers[i] && optionIndex !== q.correct);
                            });
                        });

                        submitQuizAnswers(answers);
                    });

                    const btnGoToMural = document.getElementById('btnGoToMural');
                    if (btnGoToMural) btnGoToMural.addEventListener('click', () => {
                        clearTimeout(quizAdvanceTimer);
                        advanceTeamStage('mural');
                    });
                }
                if (stage === 'mural') {
                    const btnTimer = document.getElementById('btnStartBrainstormTimer');
                    if (btnTimer) btnTimer.addEventListener('click', () => startStageTimer('brainstorm', BRAINSTORM_MINUTES * 60));

                    const btnFinish = document.getElementById('btnFinishBrainstorm');
                    if (btnFinish) btnFinish.addEventListener('click', () => advanceTeamStage('pitch_prep_done'));
                }
                if (stage === 'pitch_prep') {
                    const btnStartPrepTimer = document.getElementById('btnStartPrepTimer');
                    if (btnStartPrepTimer) btnStartPrepTimer.addEventListener('click', () => startStageTimer('pitch_prep', PITCH_PREP_SECONDS));

                    const btnStartPitch = document.getElementById('btnStartPitch');
                    if (btnStartPitch) btnStartPitch.addEventListener('click', () => {
                        socket.emit('begin_pitch', { roomId: currentRoomId });
                    });

                    // Preparation stage skip button.
                    const btnSkip = document.getElementById('btnSkipPrep');
                    if (btnSkip) btnSkip.addEventListener('click', () => {
                        socket.emit('skip_pitch_prep', { roomId: currentRoomId, teamId: currentTeamId });
                    });
                }
                if (stage === 'pitch') {
                    const btnStartPitchTimer = document.getElementById('btnStartPitchTimer');
                    if (btnStartPitchTimer) btnStartPitchTimer.addEventListener('click', () => startStageTimer('pitch', PITCH_SECONDS));

                    const btnFinishPitch = document.getElementById('btnFinishPitch');
                    if (btnFinishPitch) btnFinishPitch.addEventListener('click', () => {
                        socket.emit('complete_pitch', { roomId: currentRoomId });
                    });

                    // Pitch stage skip button.
                    const btnSkip = document.getElementById('btnSkipPitch');
                    if (btnSkip) btnSkip.addEventListener('click', () => {
                        socket.emit('skip_pitch', { roomId: currentRoomId, teamId: currentTeamId });
                    });
                }
                if (stage === 'voting') {
                    const btnShowResults = document.getElementById('btnShowResults');
                    if (btnShowResults) btnShowResults.addEventListener('click', () => advanceStage('results'));
                }
                if (stage === 'results') {
                    const btnNewRound = document.getElementById('btnNewRound');
                    if (btnNewRound) btnNewRound.addEventListener('click', () => {
                        window.location.href = '/';
                    });
                }
            }

            window.createRoom = createRoom;
            window.joinRoom = joinRoom;
            renderApp();
        })();
    </script>
</body>
</html>
